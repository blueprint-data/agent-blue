# Local Cloudflare Tunnel (not used by Docker/Hetzner deploy — see README).
#
# Add both public hostnames on this tunnel in Cloudflare Zero Trust if needed:
#   - devagent.blueprintdata.xyz  → npm run admin:dev (Vite, proxies /api)
#   - slack-dev.blueprintdata.xyz → npm run slack:local (Slack HTTP on 3000)
#
# If slack-dev.* is not in the dashboard yet, add it (same tunnel) or Slack
# request URLs pointing at devagent will hit the admin stack instead.
tunnel: 653da738-bb0f-4e02-8341-76f21c56813e
credentials-file: /Users/marcoporracin/.cloudflared/653da738-bb0f-4e02-8341-76f21c56813e.json

ingress:
  - hostname: devagent.blueprintdata.xyz
    service: http://localhost:5173
    originRequest:
      httpHostHeader: localhost
  - hostname: slack-dev.blueprintdata.xyz
    service: http://localhost:3000
  - service: http_status:404
