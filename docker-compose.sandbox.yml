name: agent-blue-sandbox

services:
  proxy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - admin
      - slack
    ports:
      - "${SANDBOX_HTTP_PORT:-80}:80"
      - "${SANDBOX_HTTPS_PORT:-443}:443"
    environment:
      SANDBOX_DOMAIN: ${SANDBOX_DOMAIN:-sandbox.agent.blueprintdata.xyz}
    volumes:
      - ./Caddyfile.sandbox:/etc/caddy/Caddyfile:ro
      - caddy_data_sandbox:/data
      - caddy_config_sandbox:/config

  admin:
    build:
      context: .
    image: agent-blue:sandbox
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - >
        while [ ! -f /app/data/.litestream-ready ]; do
          echo "[startup] waiting for Litestream restore gate...";
          sleep 1;
        done;
        npm run start:admin
    env_file:
      - ${AGENT_BLUE_ENV_FILE:-.env.sandbox}
    environment:
      APP_DATA_DIR: /app/data
      ADMIN_PORT: "3100"
    volumes:
      - ./data-sandbox:/app/data
    depends_on:
      litestream:
        condition: service_started

  slack:
    image: agent-blue:sandbox
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - >
        while [ ! -f /app/data/.litestream-ready ]; do
          echo "[startup] waiting for Litestream restore gate...";
          sleep 1;
        done;
        npm run start:slack
    env_file:
      - ${AGENT_BLUE_ENV_FILE:-.env.sandbox}
    environment:
      APP_DATA_DIR: /app/data
      SLACK_PORT: "3000"
    volumes:
      - ./data-sandbox:/app/data
    depends_on:
      litestream:
        condition: service_started

  telegram:
    image: agent-blue:sandbox
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - >
        while [ ! -f /app/data/.litestream-ready ]; do
          echo "[startup] waiting for Litestream restore gate...";
          sleep 1;
        done;
        npm run start:telegram
    env_file:
      - ${AGENT_BLUE_ENV_FILE:-.env.sandbox}
    environment:
      APP_DATA_DIR: /app/data
    volumes:
      - ./data-sandbox:/app/data
    depends_on:
      litestream:
        condition: service_started

  # ── Continuous SQLite backup via Litestream ──────────────────────────
  litestream:
    image: litestream/litestream:0.5.9
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/app/entrypoint-litestream.sh"]
    env_file:
      - ${AGENT_BLUE_ENV_FILE:-.env.sandbox}
    volumes:
      - ./data-sandbox:/app/data
      - ./litestream.yml:/etc/litestream.yml:ro
      - ./entrypoint-litestream.sh:/app/entrypoint-litestream.sh:ro

volumes:
  caddy_data_sandbox:
  caddy_config_sandbox:
